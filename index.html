<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 로또 분석기</title>
<script src="lotto_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#0a0a1a;color:#eee;min-height:100vh;padding-bottom:80px}
.container{max-width:500px;margin:0 auto;padding:12px}
.header{text-align:center;padding:20px 0 10px;position:relative}
.header h1{font-size:24px;color:#fff}
.header h1 span{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#888;font-size:12px;margin-top:4px}
.user-bar{display:flex;justify-content:space-between;align-items:center;background:#1a1a2e;border-radius:12px;padding:10px 14px;margin-bottom:12px}
.user-bar .name{font-size:13px;color:#a78bfa}
.user-bar .logout-btn{background:#ef4444;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer}
.login-prompt{text-align:center;padding:16px;background:#1a1a2e;border-radius:12px;margin-bottom:12px}
.login-prompt p{color:#888;font-size:13px;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1a2e;border-radius:16px;padding:24px;width:90%;max-width:360px;text-align:center;position:relative}
.modal h2{color:#fff;font-size:18px;margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:16px;color:#888;font-size:20px;cursor:pointer;background:none;border:none}
.login-btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-kakao{background:#FEE500;color:#000}
.btn-google{background:#fff;color:#333}
.btn-email-toggle{background:#374151;color:#fff}
.email-form{display:none;margin-top:12px}
.email-form.show{display:block}
.email-form input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0a0a1a;color:#eee;margin-bottom:8px;font-size:13px}
.email-form .btn-row{display:flex;gap:8px}
.email-form .btn-row button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-login-submit{background:#667eea;color:#fff}
.btn-signup-submit{background:#10b981;color:#fff}
.card{background:#12122a;border:1px solid #1e1e3a;border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title .icon{font-size:18px}
.card-title.collapsible{cursor:pointer;user-select:none}
.card-title.collapsible::after{content:'▼';margin-left:auto;font-size:10px;color:#666;transition:transform 0.3s}
.card-title.collapsible.open::after{transform:rotate(180deg)}
.collapse-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.collapse-body.open{max-height:5000px}
.ball{display:inline-flex;width:36px;height:36px;border-radius:50%;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;margin:2px}
.ball.b1{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.ball.b2{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.ball.b3{background:linear-gradient(135deg,#f87171,#ef4444)}
.ball.b4{background:linear-gradient(135deg,#888,#555)}
.ball.b5{background:linear-gradient(135deg,#34d399,#10b981)}
.ball.bonus{background:linear-gradient(135deg,#c084fc,#a855f7)}
.draw-row{margin-bottom:10px;padding:10px;background:#1a1a2e;border-radius:10px}
.draw-round{font-size:12px;color:#888;margin-bottom:4px}
.draw-balls{display:flex;flex-wrap:wrap;align-items:center;gap:2px}
.draw-grade{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;margin-left:8px;font-weight:700}
.grade-S{background:#fbbf24;color:#000}
.grade-A{background:#f87171;color:#fff}
.grade-B{background:#60a5fa;color:#fff}
.grade-C{background:#34d399;color:#000}
.grade-D{background:#555;color:#fff}
.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.score-item{background:#1a1a2e;border-radius:10px;padding:12px;text-align:center}
.score-num{font-size:22px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-label{font-size:11px;color:#888;margin-top:2px}
.ai-top-card{background:linear-gradient(135deg,#667eea,#764ba2,#ef4444);padding:2px;border-radius:16px;margin-bottom:12px;animation:aiGlow 3s ease-in-out infinite}
@keyframes aiGlow{0%,100%{box-shadow:0 0 15px rgba(102,126,234,0.4)}50%{box-shadow:0 0 30px rgba(168,85,247,0.6)}}
.ai-top-inner{background:#12122a;border-radius:14px;padding:16px;text-align:center}
.ai-top-inner h3{font-size:16px;margin-bottom:4px;color:#fff}
.ai-top-inner .ai-reason{font-size:11px;color:#a78bfa;margin-bottom:10px;line-height:1.5}
.ai-top-inner .ai-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.pattern-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pattern-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s}
.pattern-card:hover{border-color:#667eea;transform:translateY(-2px)}
.pattern-card .grade{font-size:20px;font-weight:800}
.pattern-card .desc{font-size:10px;color:#888;margin-top:4px}
.pattern-card .count{font-size:11px;color:#667eea;margin-top:4px}
.result-card{background:#1a1a2e;border-radius:12px;padding:16px;margin-top:12px;border:1px solid #2a2a4a}
.result-title{font-size:13px;color:#888;margin-bottom:8px}
.result-balls{display:flex;justify-content:center;gap:4px;margin-bottom:12px}
.result-balls .ball{width:42px;height:42px;font-size:16px}
.result-badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:6px;margin:2px;background:#1e1e3a;color:#aaa}
.result-badge.green{background:#064e3b;color:#34d399}
.result-proof{margin-top:12px}
.proof-item{background:#0a0a1a;border-radius:8px;padding:10px;margin-bottom:6px;font-size:12px}
.proof-round{color:#667eea;font-weight:700}
.proof-match{color:#fbbf24}
.result-actions{display:flex;gap:8px;margin-top:12px}
.btn{padding:10px 16px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:13px;flex:1;text-align:center}
.btn-save{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-retry{background:#1e1e3a;color:#aaa}
.saved-item{background:#1a1a2e;border-radius:10px;padding:12px;margin-bottom:8px;position:relative}
.saved-meta{font-size:11px;color:#888;margin-bottom:6px}
.saved-balls{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px}
.saved-grade-tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700}
.saved-delete{position:absolute;top:10px;right:10px;background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer}
.saved-toggle{text-align:center;padding:8px;color:#667eea;font-size:12px;cursor:pointer}
.match-alert{background:linear-gradient(135deg,#064e3b,#065f46);border:1px solid #10b981;border-radius:12px;padding:14px;margin-bottom:12px}
.match-alert .title{color:#34d399;font-weight:700;font-size:14px;margin-bottom:6px}
.match-alert .detail{font-size:12px;color:#a7f3d0}
.hot-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.hot-num{text-align:center;padding:6px 2px;border-radius:8px;font-size:12px;font-weight:700}
.hot-num.hot{background:#7f1d1d;color:#fca5a5}
.hot-num.warm{background:#78350f;color:#fcd34d}
.hot-num.cool{background:#1e3a5f;color:#93c5fd}
.recent-table{width:100%;font-size:11px;border-collapse:collapse}
.recent-table th{color:#888;padding:6px 4px;border-bottom:1px solid #1e1e3a;text-align:left}
.recent-table td{padding:6px 4px;border-bottom:1px solid #0a0a1a}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;display:none;z-index:9999}
.toast.show{display:block;animation:fadeInOut 2s ease}
@keyframes fadeInOut{0%{opacity:0}15%{opacity:1}85%{opacity:1}100%{opacity:0}}
.sync-bar{text-align:center;font-size:11px;color:#888;margin-bottom:8px}
.footer{text-align:center;color:#555;font-size:11px;padding:20px 0;line-height:1.6}
.loading{text-align:center;padding:20px;color:#888;font-size:13px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎱 <span>AI</span> 로또 분석기</h1>
    <div class="sub">과거 당첨 패턴 기반 AI 분석 추천</div>
  </div>

  <div id="userBar" style="display:none" class="user-bar">
    <span class="name" id="userName"></span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div id="loginPrompt" class="login-prompt">
    <p>로그인하면 번호 저장 및 당첨 확인이 가능합니다</p>
    <button class="login-btn btn-kakao" onclick="openLoginModal()" style="width:auto;display:inline-flex;padding:10px 20px">🔑 로그인 / 회원가입</button>
  </div>

  <div id="loginModal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeLoginModal()">✕</button>
      <h2>로그인</h2>
      <button class="login-btn btn-kakao" onclick="kakaoLogin()">💬 카카오로 시작하기</button>
      <button class="login-btn btn-google" onclick="googleLogin()">G Google로 시작하기</button>
      <button class="login-btn btn-email-toggle" onclick="toggleEmailForm()">✉️ 이메일로 시작하기</button>
      <div id="emailForm" class="email-form">
        <input type="email" id="emailInput" placeholder="이메일 주소">
        <input type="password" id="pwInput" placeholder="비밀번호 (6자 이상)">
        <div class="btn-row">
          <button class="btn-login-submit" onclick="emailLogin()">로그인</button>
          <button class="btn-signup-submit" onclick="emailSignup()">회원가입</button>
        </div>
      </div>
      <div id="agreeSection" style="margin-top:12px;text-align:left;font-size:11px;color:#888">
        <label style="display:flex;align-items:start;gap:6px;margin-bottom:6px;cursor:pointer">
          <input type="checkbox" id="agreeAll" onchange="toggleAgreeAll()" style="margin-top:2px">
          <span style="color:#fff;font-weight:700">전체 동의</span>
        </label>
        <label style="display:flex;align-items:start;gap:6px;margin-bottom:4px;cursor:pointer">
          <input type="checkbox" id="agreeTerms" onchange="checkAgree()" style="margin-top:2px">
          <span>[필수] <a href="terms.html" target="_blank" style="color:#667eea">이용약관</a> 동의</span>
        </label>
        <label style="display:flex;align-items:start;gap:6px;margin-bottom:4px;cursor:pointer">
          <input type="checkbox" id="agreePrivacy" onchange="checkAgree()" style="margin-top:2px">
          <span>[필수] <a href="privacy.html" target="_blank" style="color:#667eea">개인정보 처리방침</a> 동의</span>
        </label>
        <label style="display:flex;align-items:start;gap:6px;margin-bottom:4px;cursor:pointer">
          <input type="checkbox" id="agreeData" onchange="checkAgree()" style="margin-top:2px">
          <span>[선택] AI 분석용 데이터 활용 동의</span>
        </label>
      </div>
      <p id="loginMsg" style="color:#ef4444;font-size:12px;margin-top:8px"></p>
    </div>
  </div>

  <div id="syncStatus" class="sync-bar">⏳ 데이터 로딩중...</div>
  <div id="matchAlert"></div>

  <div class="card">
    <div class="card-title"><span class="icon">🏆</span> 최근 당첨번호</div>
    <div id="lastDraws"><div class="loading">로딩중...</div></div>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">📊</span> AI 분석기 성적표</div>
    <div id="scoreboard" class="scoreboard"></div>
  </div>

  <div id="aiTopCard"></div>

  <div class="card">
    <div class="card-title"><span class="icon">🎯</span> 등급별 패턴 선택</div>
    <p style="color:#666;font-size:11px;margin-bottom:10px">원하는 등급을 선택하면 해당 패턴의 번호를 생성합니다</p>
    <div id="patternSelect" class="pattern-grid"></div>
  </div>

  <div id="recommendResult"></div>

  <div class="card">
    <div class="card-title collapsible" onclick="toggleSection('myNumBody',this)"><span class="icon">💾</span> 내 저장 번호</div>
    <div id="myNumBody" class="collapse-body open">
      <div id="myNumbers"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title collapsible" onclick="toggleSection('patternAnalBody',this)"><span class="icon">🧬</span> 역대 1등 당첨 패턴 분석 TOP 10</div>
    <div id="patternAnalBody" class="collapse-body">
      <div id="patternAnalysis"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title collapsible" onclick="toggleSection('hotBody',this)"><span class="icon">🔥</span> 핫넘버 (최근 100회)</div>
    <div id="hotBody" class="collapse-body">
      <div id="hotNumbers"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title collapsible" onclick="toggleSection('recentBody',this)"><span class="icon">📋</span> 최근 20회 당첨번호</div>
    <div id="recentBody" class="collapse-body">
      <div id="recentData"></div>
    </div>
  </div>

  <div class="footer">AI 로또 분석기 v5.0<br>과거 데이터 패턴 기반 분석 · 당첨을 보장하지 않습니다</div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============ 전역 변수 ============
var allData = [];
var patternRanking = [];
var myNumbers = [];
var currentUserInfo = null;
var showAllSaved = false;
var aiTargetGrade = 'S';
var aiReason = '';
var firebaseLoaded = false;
var kakaoLoaded = false;

// ============ 데이터 초기화 (배열 형식 변환) ============
function initData(){
  allData = [];
  if(typeof LOTTO_DATA !== 'undefined' && Array.isArray(LOTTO_DATA)){
    for(var i=0; i<LOTTO_DATA.length; i++){
      var row = LOTTO_DATA[i];
      allData.push({
        round: row[0],
        numbers: [row[1], row[2], row[3], row[4], row[5], row[6]],
        bonus: row[7]
      });
    }
  }
  var extra = [];
  try{ extra = JSON.parse(localStorage.getItem('extraDraws')||'[]'); }catch(e){}
  for(var i=0; i<extra.length; i++){
    var found = false;
    for(var j=0; j<allData.length; j++){
      if(allData[j].round === extra[i].round){ found=true; break; }
    }
    if(!found) allData.push(extra[i]);
  }
  allData.sort(function(a,b){ return a.round - b.round; });
  console.log('로컬 데이터 로드 완료: ' + allData.length + '회');
}

// ============ Firebase 동적 로드 ============
async function loadFirebase(){
  try {
    var appMod = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js");
    var fsMod = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js");
    var authMod = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js");

    var firebaseConfig = {
      apiKey:"AIzaSyBdLvfI1ItgRLtGs1qFLBMjZIn3tPaI3Nw",
      authDomain:"lottl-jihoon.firebaseapp.com",
      projectId:"lottl-jihoon",
      storageBucket:"lottl-jihoon.firebasestorage.app",
      messagingSenderId:"814020270032",
      appId:"1:814020270032:web:e4895c727d7d1e00ed0bd5"
    };

    var app = appMod.initializeApp(firebaseConfig);
    var db = fsMod.getFirestore(app);
    var auth = authMod.getAuth(app);

    window.fb = {
      db:db, auth:auth,
      collection:fsMod.collection, doc:fsMod.doc,
      setDoc:fsMod.setDoc, getDocs:fsMod.getDocs,
      deleteDoc:fsMod.deleteDoc, getDoc:fsMod.getDoc,
      signInWithPopup:authMod.signInWithPopup,
      signInWithEmailAndPassword:authMod.signInWithEmailAndPassword,
      createUserWithEmailAndPassword:authMod.createUserWithEmailAndPassword,
      signOut:authMod.signOut,
      googleProvider: new authMod.GoogleAuthProvider()
    };

    firebaseLoaded = true;
    console.log('Firebase 로드 성공');

    authMod.onAuthStateChanged(auth, function(user){
      if(user){
        onLoginSuccess(user.displayName || user.email, user.uid, 'firebase');
      }
    });

    loadFromFirebase();
  } catch(e){
    console.log('Firebase 로드 실패 (오프라인 모드):', e.message);
    document.getElementById('syncStatus').textContent='⚠️ 오프라인 모드 (로컬 데이터만 사용)';
  }
}

// ============ 카카오 로드 ============
function loadKakaoSDK(){
  var script = document.createElement('script');
  script.src = 'https://developers.kakao.com/sdk/js/kakao.js';
  script.onload = function(){
    Kakao.init('cbf6c2079920d42b51dd97f2a4ea2d65');
    kakaoLoaded = true;
    console.log('카카오 SDK 로드 성공');
  };
  script.onerror = function(){ console.log('카카오 SDK 로드 실패'); };
  document.head.appendChild(script);
}

// ============ 로그인/로그아웃 ============
function openLoginModal(){ document.getElementById('loginModal').classList.add('show'); }
function closeLoginModal(){ document.getElementById('loginModal').classList.remove('show'); document.getElementById('loginMsg').textContent=''; }
function toggleEmailForm(){ document.getElementById('emailForm').classList.toggle('show'); }

function kakaoLogin(){
  if(!kakaoLoaded){ document.getElementById('loginMsg').textContent='카카오 로딩중... 잠시 후 다시 시도해주세요'; return; }
  Kakao.Auth.login({
    success: function(authObj){
      Kakao.API.request({
        url:'/v2/user/me',
        success: function(res){
          var name = (res.properties && res.properties.nickname) ? res.properties.nickname : '카카오사용자';
          var uid = 'kakao_' + res.id;
          closeLoginModal();
          onLoginSuccess(name, uid, 'kakao');
          if(firebaseLoaded){
            window.fb.setDoc(window.fb.doc(window.fb.db,'users',uid),{
              name:name, provider:'kakao', createdAt:new Date().toISOString(), lastLogin:new Date().toISOString()
            },{merge:true});
          }
        },
        fail: function(){ document.getElementById('loginMsg').textContent='카카오 정보 요청 실패'; }
      });
    },
    fail: function(){ document.getElementById('loginMsg').textContent='카카오 로그인 실패 (https 환경에서만 작동합니다)'; }
  });
}

function googleLogin(){
  if(!firebaseLoaded){ document.getElementById('loginMsg').textContent='서버 연결중... 잠시 후 다시 시도해주세요'; return; }
  window.fb.signInWithPopup(window.fb.auth, window.fb.googleProvider).then(function(result){
    var user = result.user;
    window.fb.setDoc(window.fb.doc(window.fb.db,'users',user.uid),{
      name:user.displayName, email:user.email, provider:'google',
      createdAt:new Date().toISOString(), lastLogin:new Date().toISOString()
    },{merge:true});
  }).catch(function(err){
    document.getElementById('loginMsg').textContent='Google 로그인 실패: '+err.message;
  });
}

function emailLogin(){
  if(!firebaseLoaded){ document.getElementById('loginMsg').textContent='서버 연결중... 잠시 후 다시 시도해주세요'; return; }
  var email = document.getElementById('emailInput').value;
  var pw = document.getElementById('pwInput').value;
  if(!email||!pw){ document.getElementById('loginMsg').textContent='이메일과 비밀번호를 입력하세요'; return; }
  window.fb.signInWithEmailAndPassword(window.fb.auth, email, pw).catch(function(err){
    document.getElementById('loginMsg').textContent='로그인 실패: 이메일 또는 비밀번호를 확인하세요';
  });
}

function emailSignup(){
  if(!firebaseLoaded){ document.getElementById('loginMsg').textContent='서버 연결중... 잠시 후 다시 시도해주세요'; return; }
  var email = document.getElementById('emailInput').value;
  var pw = document.getElementById('pwInput').value;

function getBallClass(n){
  if(n<=10) return 'b1';
  if(n<=20) return 'b2';
  if(n<=30) return 'b3';
  if(n<=40) return 'b4';
  return 'b5';
}
function ballHTML(n, extra){
  return '<span class="ball '+getBallClass(n)+(extra?' '+extra:'')+'">' +n+'</span>';
}

// ============ 패턴 분석 엔진 ============
function analyzeAllWinningPatterns(){
  var patternMap = {};
  for(var i=1; i<allData.length; i++){
    var current = allData[i].numbers.slice().sort(function(a,b){return a-b;});
    var m3=0, m4=0, m5=0;
    for(var j=0; j<i; j++){
      var past = allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var matchCount=0;
      for(var k=0;k<current.length;k++){
        for(var l=0;l<past.length;l++){
          if(current[k]===past[l]){matchCount++;break;}
        }
      }
      if(matchCount===3) m3++;
      if(matchCount===4) m4++;
      if(matchCount>=5) m5++;
    }
    var key = groupKey(m3,m4,m5);
    if(!patternMap[key]){
      patternMap[key]={key:key, count:0, rounds:[], m3Total:0, m4Total:0, m5Total:0};
    }
    patternMap[key].count++;
    patternMap[key].rounds.push(allData[i].round);
    patternMap[key].m3Total += m3;
    patternMap[key].m4Total += m4;
    patternMap[key].m5Total += m5;
  }
  var patterns = [];
  for(var k in patternMap){ patterns.push(patternMap[k]); }
  patterns.sort(function(a,b){return b.count-a.count;});
  var total = patterns.length;
  for(var i=0;i<patterns.length;i++){
    var pct = i/total;
    if(pct<0.15) patterns[i].grade='S';
    else if(pct<0.35) patterns[i].grade='A';
    else if(pct<0.60) patterns[i].grade='B';
    else if(pct<0.85) patterns[i].grade='C';
    else patterns[i].grade='D';
  }
  patternRanking = patterns;
}

function groupKey(m3,m4,m5){
  return '5등'+groupRange(m3,[0,1,3,5,10,999])+'_4등'+groupRange(m4,[0,1,2,3,5,999])+'_3등'+groupRange(m5,[0,1,2,999]);
}
function groupRange(val, ranges){
  for(var i=0;i<ranges.length-1;i++){
    if(val>=ranges[i] && val<ranges[i+1]){
      if(ranges[i+1]===999) return ranges[i]+'+';
      return ranges[i]+'-'+(ranges[i+1]-1);
    }
  }
  return val+'';
}

// ============ AI 최적 패턴 ============
function decideAITarget(){
  if(allData.length<11){aiTargetGrade='S';aiReason='데이터 분석중...';return;}
  var recent10 = allData.slice(-10);
  var gradeCount = {S:0, A:0, B:0, C:0};
  for(var r=0;r<recent10.length;r++){
    var draw = recent10[r];
    var nums = draw.numbers.slice().sort(function(a,b){return a-b;});
    var m3=0, m4=0, m5=0;
    for(var j=0;j<allData.length;j++){
      if(allData[j].round >= draw.round) break;
      var past = allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var mc=0;
      for(var k=0;k<nums.length;k++){
        for(var l=0;l<past.length;l++){
          if(nums[k]===past[l]){mc++;break;}
        }
      }
      if(mc===3) m3++;
      if(mc===4) m4++;
      if(mc>=5) m5++;
    }
    var key = groupKey(m3,m4,m5);
    for(var p=0;p<patternRanking.length;p++){
      if(patternRanking[p].key===key){
        var g = patternRanking[p].grade;
        if(gradeCount.hasOwnProperty(g)) gradeCount[g]++;
        break;
      }
    }
  }
  var minGrade='S', minCount=999;
  var grades=['S','A','B','C'];
  for(var i=0;i<grades.length;i++){
    if(gradeCount[grades[i]]<minCount){
      minCount=gradeCount[grades[i]];
      minGrade=grades[i];
    }
  }
  aiTargetGrade = minGrade;
  aiReason = '최근 10회 1등 분석: S('+gradeCount.S+'회) A('+gradeCount.A+'회) B('+gradeCount.B+'회) C('+gradeCount.C+'회) → '+minGrade+'등급이 '+minCount+'회로 가장 적음 → 이번 주 '+minGrade+'등급 추천';
}

// ============ 번호 생성 ============
function selectGrade(grade){
  var targetGrade = (grade==='AI') ? aiTargetGrade : grade;
  generateByGrade(targetGrade, grade==='AI');
}

function generateByGrade(targetGrade, isAI){
  var targetPatterns=[];
  for(var i=0;i<patternRanking.length;i++){
    if(patternRanking[i].grade===targetGrade) targetPatterns.push(patternRanking[i]);
  }
  if(targetPatterns.length===0){showToast('해당 등급 패턴이 없습니다');return;}
  var freq=getFrequency();
  var best=null,bestScore=-1,bestInfo=null;
  var attempts=0,maxAttempts=10000;
  while(attempts<maxAttempts){
    attempts++;
    var nums=generateCandidate(freq);
    if(isAlreadyWon(nums)) continue;
    var numsSorted=nums.slice().sort(function(a,b){return a-b;});
    var m3=0,m4=0,m5=0;
    var proofs=[];
    for(var j=0;j<allData.length;j++){
      var past=allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var matched=[];
      for(var k=0;k<numsSorted.length;k++){
        for(var l=0;l<past.length;l++){
          if(numsSorted[k]===past[l]){matched.push(numsSorted[k]);break;}
        }
      }
      if(matched.length===3){m3++;proofs.push({round:allData[j].round,prize:'5등',matched:matched.slice(),all:past});}
      if(matched.length===4){m4++;proofs.push({round:allData[j].round,prize:'4등',matched:matched.slice(),all:past});}
      if(matched.length>=5){m5++;proofs.push({round:allData[j].round,prize:'3등',matched:matched.slice(),all:past});}
    }
    var key=groupKey(m3,m4,m5);
    var foundPattern=null;
    for(var p=0;p<patternRanking.length;p++){
      if(patternRanking[p].key===key){foundPattern=patternRanking[p];break;}
    }
    if(foundPattern && foundPattern.grade===targetGrade){
      var score=foundPattern.count;
      if(score>bestScore){bestScore=score;best=nums;bestInfo={m3:m3,m4:m4,m5:m5,key:key,grade:foundPattern.grade,patternCount:foundPattern.count,proofs:proofs,found:foundPattern};}
      if(attempts>500 && best) break;
    }
  }
  if(!best){showToast('번호 생성 실패 - 다시 시도해주세요');return;}
  showResult(best,bestInfo,isAI);
}

function generateCandidate(freq){
  var nums={};var count=0;
  var sorted=freq.slice().sort(function(a,b){return b.count-a.count;});
  var hot=[],warm=[],cold=[];
  for(var i=0;i<sorted.length;i++){
    if(i<15)hot.push(sorted[i].num);
    else if(i<30)warm.push(sorted[i].num);
    else cold.push(sorted[i].num);
  }
  var result=[];
  while(result.length<6){
    var r=Math.random();
    var pool;
    if(r<0.5)pool=hot;else if(r<0.8)pool=warm;else pool=cold;
    var n=pool[Math.floor(Math.random()*pool.length)];
    var dup=false;
    for(var i=0;i<result.length;i++){if(result[i]===n){dup=true;break;}}
    if(!dup) result.push(n);
  }
  return result.sort(function(a,b){return a-b;});
}

function getFrequency(){
  var recent=allData.slice(-100);
  var freq=[];
  for(var i=1;i<=45;i++){
    var c=0;
    for(var j=0;j<recent.length;j++){
      var nums=recent[j].numbers;
      for(var k=0;k<nums.length;k++){if(nums[k]===i){c++;break;}}
    }
    freq.push({num:i,count:c});
  }
  return freq;
}

function isAlreadyWon(nums){
  var s=nums.slice().sort(function(a,b){return a-b;}).join(',');
  for(var i=0;i<allData.length;i++){
    if(allData[i].numbers.slice().sort(function(a,b){return a-b;}).join(',')===s) return true;
  }
  return false;
}

    }
    var ballsStr='';for(var b=0;b<entry.numbers.length;b++){ballsStr+=ballHTML(entry.numbers[b]);}
    html+='<div class="saved-item"><button class="saved-delete" onclick="deleteMyNumber(\''+entry.id+'\')">✕</button><div class="saved-meta">'+entry.date+' '+(entry.time||'')+' · '+(entry.targetRound||'?')+'회차 대상</div><div class="saved-balls">'+ballsStr+'</div><span class="saved-grade-tag grade-'+(entry.grade||'D')+'">'+(entry.grade||'-')+'등급</span><span style="font-size:10px;color:#666;margin-left:4px">'+(entry.patternKey||'')+'</span>'+matchInfo+'</div>';
  }
  if(myNumbers.length>3){
    if(showAllSaved){
      html+='<div class="saved-toggle" onclick="showAllSaved=false;showMyNumbers()">▲ 접기</div>';
    } else {
      html+='<div class="saved-toggle" onclick="showAllSaved=true;showMyNumbers()">▼ 전체 보기 ('+(myNumbers.length-3)+'개 더)</div>';
    }
  }
  el.innerHTML=html;
}

// ============ 당첨 확인 ============
function checkMyMatches(){
  if(myNumbers.length===0||allData.length===0) return;
  var alertHTML='';
  for(var i=0;i<myNumbers.length;i++){
    var entry=myNumbers[i];
    if(entry.result) continue;
    var target=entry.targetRound;
    var draw=null;
    for(var j=0;j<allData.length;j++){if(allData[j].round===target){draw=allData[j];break;}}
    if(!draw) continue;
    var myNums=entry.numbers.slice().sort(function(a,b){return a-b;});
    var drawNums=draw.numbers.slice().sort(function(a,b){return a-b;});
    var matched=[];
    for(var k=0;k<myNums.length;k++){
      for(var l=0;l<drawNums.length;l++){
        if(myNums[k]===drawNums[l]){matched.push(myNums[k]);break;}
      }
    }
    if(matched.length>=3){
      entry.result={round:draw.round,matchCount:matched.length,matchedNumbers:matched,checkedAt:new Date().toISOString()};
      var prizeLabel=matched.length>=6?'🏆 1등!!':matched.length===5?'🎉 3등!':matched.length===4?'🎊 4등!':'5등';
      alertHTML+='<div class="match-alert"><div class="title">'+prizeLabel+' 당첨!</div><div class="detail">'+entry.date+' 저장 번호 ['+myNums.join(', ')+']<br>'+draw.round+'회 당첨번호 ['+drawNums.join(', ')+']<br>일치: '+matched.join(', ')+' ('+matched.length+'개)<br>패턴: '+entry.grade+'등급 / '+entry.patternKey+'</div></div>';
      if(firebaseLoaded && currentUserInfo){
        window.fb.setDoc(window.fb.doc(window.fb.db,'users',currentUserInfo.uid,'numbers',entry.id),entry,{merge:true});
      }
    }
  }
  document.getElementById('matchAlert').innerHTML=alertHTML;
  showMyNumbers();showScoreboard();
}

// ============ 패턴 분석 TOP 10 ============
function showPatternAnalysis(){
  var el=document.getElementById('patternAnalysis');
  if(patternRanking.length===0){el.innerHTML='<div class="loading">분석 데이터 없음</div>';return;}
  var top10=patternRanking.slice(0,10);
  var html='<div style="font-size:11px;color:#888;margin-bottom:8px">패턴 = 생성번호가 과거 당첨번호와 몇회 일치하는지의 분포</div>';
  for(var i=0;i<top10.length;i++){
    var p=top10[i];
    var lastRounds=p.rounds.slice(-3).join(', ');
    html+='<div style="background:#1a1a2e;border-radius:8px;padding:10px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;font-weight:700">'+(i+1)+'위 <span class="draw-grade grade-'+p.grade+'">'+p.grade+'</span></span><span style="font-size:11px;color:#667eea">'+p.count+'회 출현</span></div><div style="font-size:11px;color:#aaa;margin-top:4px">'+p.key+'</div><div style="font-size:10px;color:#666;margin-top:2px">최근 출현: '+lastRounds+'회</div></div>';
  }
  el.innerHTML=html;
}

// ============ 핫넘버 ============
function showHotNumbers(){
  var freq=getFrequency();
  freq.sort(function(a,b){return b.count-a.count;});
  var max=freq[0].count,min=freq[freq.length-1].count;
  var third=(max-min)/3;
  var html='<div class="hot-grid">';
  for(var i=1;i<=45;i++){
    var f=null;
    for(var j=0;j<freq.length;j++){if(freq[j].num===i){f=freq[j];break;}}
    var cls=f.count>=(min+third*2)?'hot':f.count>=(min+third)?'warm':'cool';
    html+='<div class="hot-num '+cls+'">'+i+'<br><small>'+f.count+'</small></div>';
  }
  html+='</div><div style="display:flex;justify-content:center;gap:12px;margin-top:8px;font-size:10px"><span style="color:#fca5a5">● 상위</span><span style="color:#fcd34d">● 중위</span><span style="color:#93c5fd">● 하위</span></div>';
  document.getElementById('hotNumbers').innerHTML=html;
}

// ============ 최근 20회 ============
function showRecentData(){
  var el=document.getElementById('recentData');
  if(allData.length===0){el.innerHTML='데이터 없음';return;}
  var recent=allData.slice(-20).reverse();
  var html='<table class="recent-table"><tr><th>회차</th><th>당첨번호</th><th>보너스</th></tr>';
  for(var i=0;i<recent.length;i++){
    var d=recent[i];
    var nums=d.numbers.slice().sort(function(a,b){return a-b;});
    var ballsStr='';for(var b=0;b<nums.length;b++){ballsStr+=ballHTML(nums[b]);}
    html+='<tr><td>'+d.round+'</td><td>'+ballsStr+'</td><td>'+(d.bonus?ballHTML(d.bonus,'bonus'):'-')+'</td></tr>';
  }
  html+='</table>';
  el.innerHTML=html;
}

// ============ 접기/펼치기 ============
function toggleSection(id,titleEl){
  var el=document.getElementById(id);
  el.classList.toggle('open');
  if(titleEl) titleEl.classList.toggle('open');
}

// ============ 토스트 ============
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// ============ 전체 새로고침 ============
function refreshAll(){
  showLastDraws();
  showScoreboard();
  showAITopCard();
  showPatternSelect();
  showMyNumbers();
  showPatternAnalysis();
  showHotNumbers();
  showRecentData();
}

// ============ 시작 ============
initData();
analyzeAllWinningPatterns();
refreshAll();
loadFirebase();
loadKakaoSDK();
</script>
